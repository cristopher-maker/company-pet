<main class="register w-full h-screen flex items-center justify-center p-4">
  <div class="topbar absolute top-4 left-4">
    <a routerLink="/login" aria-label="Volver al login" class="back inline-flex items-center justify-center w-10 h-10 rounded-full text-white hover:bg-white/10 transition-colors">
      <mat-icon>arrow_back</mat-icon>
    </a>
  </div>

  <div class="shell w-full max-w-md">
    <div class="auth-stage" aria-hidden="true">
      <div class="auth-shape auth-shape--blue"></div>
      <div class="auth-shape auth-shape--orange"></div>
    </div>
    <div class="card" role="region" aria-label="Registro">
      <div class="brand">
        <div class="mark">CC</div>
        <div class="brand-text">
          <div class="name">company pet</div>
          <div class="sub">para mascotas</div>
        </div>
      </div>

      <h1 class="title">Crear cuenta</h1>
      <p class="hint">Elige el tipo de cuenta para configurar tu acceso.</p>

      <div class="role" role="tablist" aria-label="Tipo de cuenta">
        <button
          type="button"
          class="role-btn"
          [class.active]="role === 'employee'"
          (click)="role = 'employee'"
          role="tab"
          [attr.aria-selected]="role === 'employee'"
        >
          Empleado
        </button>
        <button
          type="button"
          class="role-btn"
          [class.active]="role === 'company_admin'"
          (click)="role = 'company_admin'"
          role="tab"
          [attr.aria-selected]="role === 'company_admin'"
        >
          Empresa
        </button>
      </div>

      <form class="form" (ngSubmit)="submit()">
        <label class="pill" *ngIf="role !== 'company_admin'" aria-label="Nombre">
          <input
            [(ngModel)]="fullName"
            name="fullName"
            type="text"
            autocomplete="name"
            placeholder="Nombre y apellido"
            required
          />
          <mat-icon>person_outline</mat-icon>
        </label>

        <label class="pill" *ngIf="role === 'company_admin'" aria-label="RUT empresa">
          <input
            [(ngModel)]="companyRut"
            name="companyRut"
            type="text"
            inputmode="text"
            autocomplete="off"
            placeholder="RUT empresa (ej: 12.345.678-9)"
            required
          />
          <mat-icon>badge</mat-icon>
        </label>

        <label class="pill" *ngIf="role === 'company_admin'" aria-label="Empresa">
          <input
            [(ngModel)]="companyName"
            name="companyName"
            type="text"
            autocomplete="organization"
            placeholder="Nombre de la empresa"
            required
          />
          <mat-icon>business</mat-icon>
        </label>

        <label class="pill" aria-label="Email">
          <input
            [(ngModel)]="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="Email"
            required
          />
          <mat-icon>mail_outline</mat-icon>
        </label>

        <label class="pill" aria-label="Contraseña">
          <input
            [(ngModel)]="password"
            name="password"
            [type]="showPassword ? 'text' : 'password'"
            autocomplete="new-password"
            placeholder="Contraseña"
            required
          />
          <button
            type="button"
            class="icon-btn"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </label>

        <div class="msg error" *ngIf="error">{{ error }}</div>
        <div class="msg success" *ngIf="success">{{ success }}</div>

        <button class="primary" type="submit" [disabled]="loading">
          <svg *ngIf="loading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span *ngIf="!loading">Crear cuenta</span>
        </button>

        <div class="bottom">
          <span class="muted">¿Ya tienes cuenta?</span>
          <a class="link" routerLink="/login">Ingresar</a>
        </div>
      </form>
    </div>
  </div>
</main>
