<main class="reset w-full h-screen flex items-center justify-center p-4">
  <div class="bg" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <div class="topbar absolute top-4 left-4">
    <a routerLink="/login" aria-label="Volver al login" class="back inline-flex items-center justify-center w-10 h-10 rounded-full text-white hover:bg-white/10 transition-colors">
      <img src="svg/arrow-back-outline.svg" class="w-6 h-6" alt="Volver" />
    </a>
  </div>

  <div class="shell w-full max-w-md">
    <div class="card" role="region" aria-label="Restablecer contraseña">
      <div class="brand">
        <div class="mark">CC</div>
        <div class="brand-text">
          <div class="name">company pet</div>
          <div class="sub">para mascotas</div>
        </div>
      </div>

      <h1 class="title">Nueva contraseña</h1>
      <p class="hint">Ingresa y confirma tu nueva contraseña para acceder al portal.</p>

      <form class="form" (ngSubmit)="submit()">
        <label class="pill" aria-label="Nueva contraseña">
          <img src="svg/lock-closed-outline.svg" class="w-5 h-5" alt="" aria-hidden="true" />
          <input
            [(ngModel)]="password"
            name="password"
            type="password"
            placeholder="Nueva contraseña"
            required
          />
        </label>

        <label class="pill" aria-label="Confirmar contraseña">
          <img src="svg/checkmark-circle-outline.svg" class="w-5 h-5" alt="" aria-hidden="true" />
          <input
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            type="password"
            placeholder="Confirmar contraseña"
            required
          />
        </label>

        <div class="msg error" *ngIf="error">{{ error }}</div>
        <div class="msg success" *ngIf="success">{{ success }}</div>

        <button class="primary" type="submit" [disabled]="loading">
          <span *ngIf="!loading">Actualizar contraseña</span>
          <span *ngIf="loading">Actualizando...</span>
        </button>
      </form>
    </div>
  </div>
</main>
